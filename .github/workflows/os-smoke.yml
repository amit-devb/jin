      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install build tooling
        run: python -m pip install --upgrade pip "maturin>=1.6,<2.0"

      - name: Install project (native extension)
        run: python -m pip install -e ".[dev]"

      - name: Run sandbox smoke
        run: python scripts/sandbox_fastapi_jin_smoke.py

  windows-smoke:
    name: Windows sandbox smoke
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install build tooling
        run: python -m pip install --upgrade pip "maturin>=1.6,<2.0"

      - name: Install project (native extension)
        run: python -m pip install -e ".[dev]"

      - name: Run sandbox smoke
        run: python scripts/sandbox_fastapi_jin_smoke.py
