name: OS Smoke (ci-test)

on:
  push:
    branches:
      - ci-test
  workflow_dispatch:

permissions:
  contents: read

env:
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
  JIN_SMOKE_MODE: "ci"

jobs:
  linux-smoke:
    name: Linux sandbox smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install build tooling
        run: python -m pip install --upgrade pip "maturin>=1.6,<2.0"

      - name: Install project (native extension)
        run: python -m pip install -e ".[dev]"

      - name: Run sandbox smoke
        run: python scripts/sandbox_fastapi_jin_smoke.py

  macos-smoke:
    name: macOS sandbox smoke
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

