name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # Allow specific matrix entries to be optional without failing the whole release.
    # This keeps the release pipeline healthy while we expand platform coverage.
    continue-on-error: ${{ matrix.allow_failure == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Publish one Linux wheel with broad compatibility (glibc 2.17+).
          # This is the most reliable default and avoids dual-tag platform edge cases.
          - os: ubuntu-latest
            artifact_name: release-wheel-linux-x86_64-manylinux2014
            rust_target: x86_64-unknown-linux-gnu
            manylinux: 2014
            allow_failure: false
          # Build both macOS wheels on macos-latest to avoid relying on deprecated
          # Intel macOS runner images/configurations.
          - os: macos-latest
            artifact_name: release-wheel-macos-x86_64
            rust_target: x86_64-apple-darwin
            maturin_target: x86_64-apple-darwin
          - os: macos-latest
            artifact_name: release-wheel-macos-arm64
            rust_target: aarch64-apple-darwin
            maturin_target: aarch64-apple-darwin
          - os: windows-latest
            artifact_name: release-wheel-windows-x86_64
            rust_target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Cache Rust and pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-jin-release-deps-${{ hashFiles('pyproject.toml', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-jin-release-deps-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Host diagnostics (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          uname -a
          echo "== memory =="
          free -h || true
          echo "== disk =="
          df -h || true
          echo "== ulimit =="
          ulimit -a || true
      - name: Build wheel (Linux manylinux)
        if: runner.os == 'Linux'
        # Use the official PyO3 action to guarantee we compile inside the correct manylinux
        # docker image (otherwise auditwheel will reject the wheel on ubuntu-latest).
        uses: PyO3/maturin-action@v1
        with:
          command: build
          # Pin the toolchain inside the manylinux container to avoid "works locally, fails in docker"
          # drift. Our current dependency set requires rustc >= 1.86.
          rust-toolchain: "1.86.0"
          # Force a single interpreter build (abi3 wheel) inside a proper manylinux docker image.
          # We intentionally build DuckDB from source here (via default features) to keep the
          # resulting wheel manylinux2014 compliant. Downloaded/prebuilt libduckdb binaries
          # are not guaranteed to meet the manylinux symbol/version constraints.
          #
          # DuckDB compilation can be memory hungry; keep parallelism low to avoid OOM in CI.
          args: --release --strip --out dist --interpreter python3.9 --auditwheel repair -vv --jobs 1 --features extension-module --locked
          manylinux: ${{ matrix.manylinux }}
          # NOTE: env vars set on the workflow step are not guaranteed to reach the manylinux
          # docker container. Pass them explicitly via docker run options.
          # DuckDB 1.105xx hard-errors on "legacy" libstdc++ ABI builds unless an explicit platform is chosen.
          # Force the modern ABI and set a stable platform string so extension auto-install (if enabled) has a target.
          docker-options: >-
            -e PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
            -e RUST_BACKTRACE=1
            -e CARGO_TERM_COLOR=always
            -e CMAKE_BUILD_PARALLEL_LEVEL=1
            -e MAKEFLAGS=-j1
            -e CXXFLAGS=-D_GLIBCXX_USE_CXX11_ABI=1
            -e CXXFLAGS_x86_64_unknown_linux_gnu=-DDUCKDB_CUSTOM_PLATFORM=linux_amd64

      - name: Failure diagnostics (Linux)
        if: failure() && runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          echo "== docker info =="
          docker info || true
          echo "== docker ps -a =="
          docker ps -a || true
          echo "== recent kernel messages (may show OOM kills) =="
          (sudo dmesg --ctime | tail -n 200) || (dmesg --ctime | tail -n 200) || true

      - name: Install maturin
        if: runner.os != 'Linux'
        run: python -m pip install --upgrade pip maturin

      - name: Build wheel
        if: runner.os != 'Linux'
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        shell: bash
        run: |
          args=(--release --find-interpreter --strip --out dist)
          if [[ -n "${{ matrix.maturin_target }}" ]]; then
            args+=(--target "${{ matrix.maturin_target }}")
          fi
          python -m maturin build "${args[@]}"
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Cache Rust and pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-jin-release-deps-${{ hashFiles('pyproject.toml', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-jin-release-deps-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build source distribution
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: |
          python -m pip install maturin build
          mkdir -p dist
          maturin sdist --out dist
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-sdist
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs: [build, build-sdist]
    environment: pypi
    permissions:
      id-token: write
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Generate release notes and changelog
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = process.env.GITHUB_REF_NAME;
            const notes = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
            });

            fs.writeFileSync('release-notes.md', notes.data.body.trim() + '\n');
            fs.writeFileSync(
              'CHANGELOG.md',
              `# Changelog\n\n## ${tag}\n\n${notes.data.body.trim()}\n`,
            );
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            CHANGELOG.md
          body_path: release-notes.md
