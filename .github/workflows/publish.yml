name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: release-wheel-linux-x86_64
          - os: macos-13
            artifact_name: release-wheel-macos-x86_64
          - os: macos-latest
            artifact_name: release-wheel-macos-arm64
          - os: windows-latest
            artifact_name: release-wheel-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Cache Rust and pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-jin-release-deps-${{ hashFiles('pyproject.toml', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-jin-release-deps-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install maturin
        run: python -m pip install --upgrade pip maturin
      - name: Build wheel
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        shell: bash
        run: |
          args=(--release --find-interpreter --strip --out dist)
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            args+=(--manylinux 2014)
          fi
          python -m maturin build "${args[@]}"
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Cache Rust and pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-jin-release-deps-${{ hashFiles('pyproject.toml', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-jin-release-deps-
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build source distribution
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: |
          python -m pip install maturin build
          mkdir -p dist
          maturin sdist --out dist
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-sdist
          path: dist/*

  publish:
    runs-on: ubuntu-latest
    needs: [build, build-sdist]
    environment: pypi
    permissions:
      id-token: write
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Generate release notes and changelog
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = process.env.GITHUB_REF_NAME;
            const notes = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
            });

            fs.writeFileSync('release-notes.md', notes.data.body.trim() + '\n');
            fs.writeFileSync(
              'CHANGELOG.md',
              `# Changelog\n\n## ${tag}\n\n${notes.data.body.trim()}\n`,
            );
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            CHANGELOG.md
          body_path: release-notes.md
