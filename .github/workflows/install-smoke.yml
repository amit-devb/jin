name: Install Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read

concurrency:
  group: install-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            method: pip
          - os: ubuntu-latest
            method: pipx
          - os: ubuntu-latest
            method: uv
          - os: ubuntu-latest
            method: poetry
          - os: macos-latest
            method: pip
          - os: macos-latest
            method: uv
          - os: windows-latest
            method: pip
          - os: windows-latest
            method: uv
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install maturin
        run: python -m pip install --upgrade pip maturin
      - name: Build wheel (local)
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: python -m maturin build --release --find-interpreter --strip --out dist
      - name: Cache uv and Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-jin-deps-${{ hashFiles('uv.lock', 'pyproject.toml', 'Cargo.toml', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-jin-deps-
      - name: Install pip tooling
        if: matrix.method == 'pip'
        run: python -m pip install --upgrade pip
      - name: Install pipx tooling
        if: matrix.method == 'pipx'
        run: python -m pip install --upgrade pip pipx
      - name: Install uv tooling
        if: matrix.method == 'uv'
        uses: astral-sh/setup-uv@v4
      - name: Install poetry tooling
        if: matrix.method == 'poetry'
        run: python -m pip install --upgrade pip poetry
      - name: Run install smoke test
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
          JIN_INSTALL_SLO_SECONDS: "30"
          JIN_ENFORCE_INSTALL_SLO: "true"
          JIN_SMOKE_INSTALL_SOURCE: "wheel"
          JIN_SMOKE_WHEEL_GLOB: "${{ github.workspace }}/dist/*.whl"
        shell: bash
        run: ./scripts/smoke_install_matrix.sh ${{ matrix.method }}
