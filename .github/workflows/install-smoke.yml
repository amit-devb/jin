name: Install Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read

env:
  # GitHub Actions is migrating JS actions from Node 20 to Node 24.
  # Opt in early to avoid surprise breakage for actions like astral-sh/setup-uv.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: install-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            method: pip
          - os: ubuntu-latest
            method: pipx
          - os: ubuntu-latest
            method: uv
          - os: macos-latest
            method: pip
          - os: macos-latest
            method: uv
          - os: windows-latest
            method: pip
          - os: windows-latest
            method: uv
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install pip tooling
        if: matrix.method == 'pip'
        run: python -m pip install --upgrade pip
      - name: Install pipx tooling
        if: matrix.method == 'pipx'
        run: python -m pip install --upgrade pip pipx
      - name: Install uv tooling
        if: matrix.method == 'uv'
        uses: astral-sh/setup-uv@v4
      - name: Cache uv downloads
        if: matrix.method == 'uv'
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-jin-uv-cache-${{ hashFiles('.github/workflows/install-smoke.yml') }}
          restore-keys: |
            ${{ runner.os }}-jin-uv-cache-
      - name: Run install smoke test
        env:
          # This workflow measures the real end-user experience: install from PyPI using wheels only.
          JIN_INSTALL_SLO_SECONDS: "20"
          JIN_ENFORCE_INSTALL_SLO: "true"
          JIN_SMOKE_INSTALL_SOURCE: "pypi"
          JIN_SMOKE_PYPI_PACKAGE: "jin-monitor"
        shell: bash
        run: ./scripts/smoke_install_matrix.sh ${{ matrix.method }}
