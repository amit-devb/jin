name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Cache uv and Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-jin-deps-${{ hashFiles('uv.lock', 'pyproject.toml', 'Cargo.toml', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-jin-deps-
      - name: Install frontend dependencies
        run: npm ci
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Create venv
        run: uv venv .venv
      - name: Sync project dependencies
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: uv sync --frozen --extra dev
      - name: Verify native + Python fallback paths
        env:
          PYTHONPATH: python
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: make verify

  install-smoke-fast:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            method: pip
          - os: ubuntu-latest
            method: uv
          - os: macos-latest
            method: pip
          - os: macos-latest
            method: uv
          - os: windows-latest
            method: pip
          - os: windows-latest
            method: uv
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install uv tooling
        if: matrix.method == 'uv'
        uses: astral-sh/setup-uv@v4
      - name: Install maturin
        run: python -m pip install --upgrade pip maturin
      - name: Build wheel (local)
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: python -m maturin build --release --find-interpreter --strip --out dist
      - name: Run install smoke test
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
          JIN_INSTALL_SLO_SECONDS: "30"
          JIN_ENFORCE_INSTALL_SLO: "true"
          JIN_SMOKE_INSTALL_SOURCE: "wheel"
          JIN_SMOKE_WHEEL_GLOB: "${{ github.workspace }}/dist/*.whl"
        shell: bash
        run: ./scripts/smoke_install_matrix.sh ${{ matrix.method }}
