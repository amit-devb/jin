name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Cache uv and Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-jin-deps-${{ hashFiles('uv.lock', 'pyproject.toml', 'Cargo.toml', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-jin-deps-
      - name: Install frontend dependencies
        run: npm ci
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Create venv
        run: uv venv .venv
      - name: Sync project dependencies
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: uv sync --frozen --extra dev
      - name: Verify native + Python fallback paths
        env:
          PYTHONPATH: python
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: make verify
