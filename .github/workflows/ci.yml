name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install frontend dependencies
        run: npm ci
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Create venv
        run: uv venv .venv
      - name: Install project dependencies
        run: uv pip install -e . pytest coverage maturin anyio pytest-asyncio duckdb
      - name: Verify
        env:
          PYTHONPATH: python
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: make verify

  install-smoke:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        method: [pip, pipx, uv, poetry]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install pip tooling
        if: matrix.method == 'pip'
        run: python -m pip install --upgrade pip
      - name: Install pipx tooling
        if: matrix.method == 'pipx'
        run: python -m pip install --upgrade pip pipx
      - name: Install uv tooling
        if: matrix.method == 'uv'
        uses: astral-sh/setup-uv@v4
      - name: Install poetry tooling
        if: matrix.method == 'poetry'
        run: python -m pip install --upgrade pip poetry
      - name: Run install smoke test
        run: ./scripts/smoke_install_matrix.sh ${{ matrix.method }}

  e2e:
    runs-on: ubuntu-latest
    needs: [verify, install-smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install frontend dependencies
        run: npm ci
      - name: Create venv
        run: uv venv .venv
      - name: Install app and e2e dependencies
        run: uv pip install -e . pytest coverage anyio pytest-asyncio duckdb uvicorn
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Build frontend assets
        run: npm run build
      - name: Run dashboard e2e
        run: npm run test:e2e -- --project=chromium
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results
            playwright-report
